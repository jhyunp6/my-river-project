<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하천 오염 AI 연구 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('v2');

            // 원본 파일 1 데이터
            const datasetsV1 = [
                { name: "TUD-GV", link: "https://zenodo.org/record/5716552" },
                { name: "YRDG", link: "https://github.com/YellowRiverDataset" },
                { name: "WATER-DET", link: "https://github.com/water-det" },
                { name: "TUD-HCMC", link: "https://zenodo.org/records/17387612" }
            ];

            // 원본 파일 2 데이터
            const steps = [
                { no: 1, title: "연구 질문 좁히기", emoji: "🎯", summary: "사진으로 직접 보이는 오염 징후 중심" },
                { no: 2, title: "데이터셋 찾기", emoji: "🗂️", summary: "공개 데이터 + 직접 촬영 조합" },
                { no: 3, title: "현장 촬영 계획", emoji: "📷", summary: "동일 조건 반복 촬영 중요" },
                { no: 4, title: "라벨링 기준", emoji: "🏷️", summary: "객관적 기준표 우선 작성" },
                { no: 5, title: "전처리", emoji: "🧼", summary: "배경 제거 및 빛 반사 보정" },
                { no: 6, title: "모델 구축", emoji: "🤖", summary: "분류에서 탐지로 단계적 확장" },
                { no: 7, title: "평가", emoji: "📊", summary: "데이터 오염(Leakage) 방지" },
                { no: 8, title: "결과 해석", emoji: "🔍", summary: "실패 사례 원인 분석" }
            ];

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900">
                    <nav className="sticky top-0 z-50 bg-white shadow-sm p-4 flex justify-center gap-4">
                        <button onClick={() => setActiveTab('v1')} className={`px-4 py-2 rounded-full font-bold ${activeTab === 'v1' ? 'bg-teal-600 text-white' : 'bg-slate-100'}`}>버전 1: 퀵 가이드</button>
                        <button onClick={() => setActiveTab('v2')} className={`px-4 py-2 rounded-full font-bold ${activeTab === 'v2' ? 'bg-cyan-700 text-white' : 'bg-slate-100'}`}>버전 2: 심층 로드맵</button>
                    </nav>

                    {activeTab === 'v1' ? (
                        <div className="p-8 max-w-4xl mx-auto">
                            <h1 className="text-3xl font-bold mb-6 text-teal-700 text-center">하천 오염 판별 AI 연구 가이드 (Simple)</h1>
                            <div className="grid gap-4 md:grid-cols-2 mb-10">
                                {datasetsV1.map(d => (
                                    <a key={d.name} href={d.link} target="_blank" className="p-4 bg-white border rounded-xl hover:shadow-md transition">
                                        <div className="font-bold">{d.name}</div>
                                        <div className="text-sm text-slate-500">데이터셋 바로가기</div>
                                    </a>
                                ))}
                            </div>
                            <div className="bg-white p-6 rounded-xl border shadow-sm">
                                <h2 className="text-xl font-bold mb-4">🧠 모델 구조</h2>
                                <svg viewBox="0 0 600 200" className="w-full h-auto">
                                    <rect x="20" y="60" width="120" height="60" fill="#0ea5e9" rx="8" />
                                    <text x="35" y="95" fill="white" fontSize="14">이미지 입력</text>
                                    <rect x="180" y="60" width="120" height="60" fill="#22c55e" rx="8" />
                                    <text x="205" y="95" fill="white" fontSize="14">특징 추출</text>
                                    <rect x="340" y="60" width="120" height="60" fill="#f59e0b" rx="8" />
                                    <text x="365" y="95" fill="white" fontSize="14">오염 탐지</text>
                                    <rect x="500" y="60" width="80" height="60" fill="#ef4444" rx="8" />
                                    <text x="525" y="95" fill="white" fontSize="14">결과</text>
                                    <path d="M140 90 H180 M300 90 H340 M460 90 H500" stroke="#cbd5e1" strokeWidth="2" fill="none" />
                                </svg>
                            </div>
                        </div>
                    ) : (
                        <div className="p-8 max-w-6xl mx-auto">
                            <div className="text-center mb-12">
                                <h1 className="text-4xl font-bold text-slate-800 mb-4">하천 오염 판별 AI 연구 가이드 (Advanced)</h1>
                                <p className="text-slate-600">성공적인 AI 연구를 위한 8단계 로드맵</p>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {steps.map(s => (
                                    <div key={s.no} className="bg-white p-6 rounded-2xl border hover:border-cyan-500 transition shadow-sm">
                                        <div className="text-3xl mb-2">{s.emoji}</div>
                                        <div className="text-xs font-bold text-cyan-600 uppercase">Step {s.no}</div>
                                        <h3 className="font-bold text-lg my-2">{s.title}</h3>
                                        <p className="text-sm text-slate-500">{s.summary}</p>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-12 bg-slate-900 text-white p-8 rounded-3xl">
                                <h2 className="text-2xl font-bold mb-4 text-center">마지막으로, 가장 중요한 한 문장</h2>
                                <p className="text-lg text-slate-300 leading-relaxed text-center italic">
                                    "좋은 인공지능 모델은 복잡한 알고리즘이 아니라, 잘 정의된 연구 질문과 성실한 관찰 데이터에서 출발합니다."
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
